  azure-mcp:
    image: ghcr.io/wyre-technology/azure-mcp:latest
    # azure-mcp runs a WYRE-built wrapper (gateway repo: containers/azure-mcp/),
    # not the standard vendor-MCP image. The wrapper listens on PORT, so
    # PORT=8080 is correct and intentional here — do NOT "fix" it to the
    # MCP_TRANSPORT=http + MCP_HTTP_PORT=8080 pattern the sibling sidecars use.
