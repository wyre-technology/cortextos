services:
  gateway:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - BASE_URL=http://localhost:8080
      - DATABASE_URL=postgres://gateway:gateway@postgres:5432/gateway
      - MASTER_KEY=${MASTER_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - AUTH0_DOMAIN=${AUTH0_DOMAIN:-}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID:-}
      - AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET:-}
      - AUTH0_CALLBACK_URL=${AUTH0_CALLBACK_URL:-http://localhost:8080/auth/callback}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRO_PRICE_ID=${STRIPE_PRO_PRICE_ID:-}
      - LOG_LEVEL=debug
      # Vendor container URLs (Docker Compose service names)
      - VENDOR_URL_DATTO_RMM=http://datto-rmm-mcp:8080
      - VENDOR_URL_ITGLUE=http://itglue-mcp:8080
      - VENDOR_URL_AUTOTASK=http://autotask-mcp:8080
      - VENDOR_URL_SYNCRO=http://syncro-mcp:8080
      - VENDOR_URL_ATERA=http://atera-mcp:8080
      - VENDOR_URL_KASEYA_QUOTE_MANAGER=http://kaseya-quote-manager-mcp:8080
      - VENDOR_URL_SUPEROPS=http://superops-mcp:8080
      - VENDOR_URL_HALOPSA=http://halopsa-mcp:8080
      - VENDOR_URL_CONNECTWISE_MANAGE=http://connectwise-manage-mcp:8080
      - VENDOR_URL_CONNECTWISE_AUTOMATE=http://connectwise-automate-mcp:8080
      - VENDOR_URL_NINJAONE=http://ninjaone-mcp:8080
      - VENDOR_URL_HUDU=http://hudu-mcp:8080
      - VENDOR_URL_ROCKETCYBER=http://rocketcyber-mcp:8080
      - VENDOR_URL_SENTINELONE=http://sentinelone-mcp:8080
      - VENDOR_URL_HUNTRESS=http://huntress-mcp:8080
      - VENDOR_URL_BLUMIRA=http://blumira-mcp:8080
      - VENDOR_URL_PAX8=http://pax8-mcp:8080
      - VENDOR_URL_XERO=http://xero-mcp:8080
      - VENDOR_URL_QBO=http://qbo-mcp:8080
      - VENDOR_URL_M365=http://m365-mcp:8080
      - VENDOR_URL_AVANAN=http://avanan-mcp:8080
      - VENDOR_URL_PROOFPOINT=http://proofpoint-mcp:8080
      - VENDOR_URL_KNOWBE4=http://knowbe4-mcp:8080
      - VENDOR_URL_SHERWEB=http://sherweb-mcp:8080
      - VENDOR_URL_BLACKPOINT=http://blackpoint-mcp:8080
      - VENDOR_URL_CIPP=http://cipp-mcp:8080
      - VENDOR_URL_CREWHU=http://crewhu-mcp:8080
      - VENDOR_URL_DATTO_BCDR=http://datto-bcdr-mcp:8080
      - VENDOR_URL_DATTO_SAAS_PROTECTION=http://datto-saas-protection-mcp:8080
      - VENDOR_URL_IMMYBOT=http://immybot-mcp:8080
      - VENDOR_URL_KASEYA_BMS=http://kaseya-bms-mcp:8080
      - VENDOR_URL_KASEYA_VSA=http://kaseya-vsa-mcp:8080
      - VENDOR_URL_SPANNING=http://spanning-mcp:8080
      - VENDOR_URL_THREATLOCKER=http://threatlocker-mcp:8080
      - VENDOR_URL_TIMEZEST=http://timezest-mcp:8080
      - VENDOR_URL_UNITRENDS=http://unitrends-mcp:8080
      - VENDOR_URL_AZURE_MCP=http://azure-mcp:8080
      # OAuth vendor app credentials (gateway-level, not per-user)
      - XERO_CLIENT_ID=${XERO_CLIENT_ID:-}
      - XERO_CLIENT_SECRET=${XERO_CLIENT_SECRET:-}
      - QBO_CLIENT_ID=${QBO_CLIENT_ID:-}
      - QBO_CLIENT_SECRET=${QBO_CLIENT_SECRET:-}
      - HUBSPOT_CLIENT_ID=${HUBSPOT_CLIENT_ID:-}
      - HUBSPOT_CLIENT_SECRET=${HUBSPOT_CLIENT_SECRET:-}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=gateway
      - POSTGRES_PASSWORD=gateway
      - POSTGRES_DB=gateway
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway"]
      interval: 5s
      timeout: 3s
      retries: 5

  datto-rmm-mcp:
    image: ghcr.io/wyre-technology/datto-rmm-mcp:latest
    environment:
      - AUTH_MODE=gateway
      - PORT=8080
    expose:
      - "8080"

  itglue-mcp:
    image: ghcr.io/wyre-technology/itglue-mcp:latest
    environment:
