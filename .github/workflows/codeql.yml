name: CodeQL

# GitHub semantic code scanning for JavaScript/TypeScript.
#
#   pull_request  → scan the diff's language surface, fast feedback.
#   push (main)   → scan full tree on merge, keeps the default-branch
#                   baseline in the Security tab fresh.
#   schedule      → weekly sweep so newly-published CodeQL rules can
#                   light up on code that hasn't changed.
#
# Findings upload as SARIF to the GitHub Security tab (code-scanning).
# Non-blocking: a new alert does not fail the PR. Reviewers triage in
# the Security tab per docs/operations/security-scanning.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 06:17 UTC — off-peak, avoids the top-of-hour rush.
    - cron: '17 6 * * 1'

permissions:
  contents: read
  security-events: write  # required to upload SARIF
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        with:
          category: "/language:${{ matrix.language }}"
