name: Release

# Conduit release pipeline.
#
#   push to main → docker build + push (sha + latest tags)
#                  Fast feedback, every commit gets a :sha-<short> image.
#   schedule / workflow_dispatch → semantic-release
#                  Cuts a version, updates CHANGELOG, creates GitHub release
#                  + git tag, then re-tags the already-built docker image
#                  with the new semver.
#
# Image path is pinned to ghcr.io/wyre-technology/conduit so downstream
# Conduit images never collide with upstream mcp-gateway tags, regardless
# of how the repo is renamed or forked.

on:
  push:
    branches: [main]
  schedule:
    # 17:00 UTC Mon-Fri = 1pm ET. Batches merges into a single release.
    - cron: '0 17 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

env:
  IMAGE_NAME: ghcr.io/wyre-technology/conduit

jobs:
  release:
    # Only cut a version on schedule or manual dispatch.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_info.outputs.version }}
      released: ${{ steps.release_info.outputs.released }}
      source_sha: ${{ steps.release_info.outputs.source_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Get release info
        id: release_info
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$VERSION" ]; then
            # The release commit ([skip ci]) does NOT trigger docker — only its
            # parent (the merge commit that triggered THIS workflow run via push
            # event earlier) was built by docker. docker-release-tag must re-tag
            # FROM the parent SHA, not from $GITHUB_SHA which points to the
            # release commit itself. Without this, imagetools create fails with
            # "sha-<release-commit> not found" because no docker image exists
            # for the release commit.
            SOURCE_SHA="$(git rev-parse HEAD^ 2>/dev/null || echo "")"
            if [ -z "$SOURCE_SHA" ]; then
              echo "::error::could not resolve parent of release commit; docker-release-tag would fail"
              exit 1
            fi
            SHORT_SOURCE="$(echo "$SOURCE_SHA" | cut -c1-7)"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "source_sha=$SHORT_SOURCE" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

  docker:
    # Build + push on every push to main. Does NOT depend on release job.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-release-tag:
    # After semantic-release cuts a version, re-tag the existing image
    # (built on the original push) with the new semver. This avoids a
    # second build and guarantees the released tag points at the exact
    # SHA semantic-release analyzed.
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag release image
        env:
          VERSION: ${{ needs.release.outputs.version }}
          SOURCE_SHA: ${{ needs.release.outputs.source_sha }}
        run: |
          # VERSION is the git tag (e.g. v1.2.3). Strip leading 'v' for semver.
          SEMVER="${VERSION#v}"
          # SOURCE_SHA is the parent of the release commit — the merge commit
          # that triggered docker via the original push event. Using
          # $GITHUB_SHA here would point at the release commit ([skip ci])
          # which docker never built; imagetools create would fail with
          # "sha-<release-commit> not found".
          SRC="${IMAGE_NAME}:sha-${SOURCE_SHA}"

          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${VERSION}" \
            --tag "${IMAGE_NAME}:${SEMVER}" \
            "${SRC}"
