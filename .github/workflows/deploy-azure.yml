# =============================================================================
# MCP Gateway - Azure Container Apps Deployment Workflow
# =============================================================================
# This workflow builds container images and deploys to Azure Container Apps
#
# Required GitHub Secrets:
#   - AZURE_CREDENTIALS: Azure service principal credentials (JSON)
#   - AZURE_SUBSCRIPTION_ID: Azure subscription ID
#   - ACR_LOGIN_SERVER: Azure Container Registry login server
#   - ACR_NAME: Azure Container Registry name
#
# Optional Secrets (for Terraform):
#   - TF_VAR_postgres_admin_password: PostgreSQL password
#   - TF_VAR_admin_password: MCP Gateway admin password
#   - TF_VAR_secret_key: JWT secret key
#   - TF_VAR_entra_client_secret: Entra ID client secret
# =============================================================================

name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
    paths:
      - 'registry/**'
      - 'auth_server/**'
      - 'docker/**'
      - 'infrastructure/azure/**'
      - '.github/workflows/deploy-azure.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'infrastructure/azure/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      deploy_infrastructure:
        description: 'Deploy infrastructure changes'
        required: false
        default: false
        type: boolean
      deploy_containers:
        description: 'Build and deploy container images'
        required: false
        default: true
        type: boolean

env:
  REGISTRY_IMAGE: registry
  AUTH_SERVER_IMAGE: auth-server

jobs:
  # ---------------------------------------------------------------------------
  # Terraform Plan (for PRs and infrastructure changes)
  # ---------------------------------------------------------------------------
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event.inputs.deploy_infrastructure == 'true'

    defaults:
      run:
        working-directory: infrastructure/azure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="postgres_admin_password=${{ secrets.TF_VAR_POSTGRES_ADMIN_PASSWORD }}" \
            -var="admin_password=${{ secrets.TF_VAR_ADMIN_PASSWORD }}" \
            -var="secret_key=${{ secrets.TF_VAR_SECRET_KEY }}" \
            -var="entra_client_secret=${{ secrets.TF_VAR_ENTRA_CLIENT_SECRET }}" \
            -no-color \
            -out=tfplan
        continue-on-error: true

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infrastructure/azure/tfplan
          retention-days: 5

  # ---------------------------------------------------------------------------
  # Terraform Apply (for main branch only)
  # ---------------------------------------------------------------------------
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event.inputs.deploy_infrastructure == 'true'
    environment: ${{ github.event.inputs.environment || 'staging' }}

    defaults:
      run:
        working-directory: infrastructure/azure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: infrastructure/azure

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Get Outputs
        id: outputs
        run: |
          echo "acr_login_server=$(terraform output -raw acr_login_server)" >> $GITHUB_OUTPUT
          echo "registry_url=$(terraform output -raw registry_url)" >> $GITHUB_OUTPUT
          echo "resource_group=$(terraform output -raw resource_group_name)" >> $GITHUB_OUTPUT

    outputs:
      acr_login_server: ${{ steps.outputs.outputs.acr_login_server }}
      registry_url: ${{ steps.outputs.outputs.registry_url }}
      resource_group: ${{ steps.outputs.outputs.resource_group }}

  # ---------------------------------------------------------------------------
  # Build and Push Container Images
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event.inputs.deploy_containers == 'true')

    strategy:
      matrix:
        include:
          - image: registry
            dockerfile: docker/Dockerfile.registry
            context: .
          - image: auth-server
            dockerfile: docker/Dockerfile.auth
            context: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ github.sha }}

  # ---------------------------------------------------------------------------
  # Deploy to Container Apps
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Container App Info
        id: info
        run: |
          # Get resource group from Terraform state or use convention
          RG_NAME="${{ vars.AZURE_RESOURCE_GROUP || 'mcp-gateway-rg' }}"
          echo "resource_group=$RG_NAME" >> $GITHUB_OUTPUT

      - name: Update Registry Container App
        run: |
          az containerapp update \
            --name mcp-gateway-registry \
            --resource-group ${{ steps.info.outputs.resource_group }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.REGISTRY_IMAGE }}:${{ github.sha }}

      - name: Update Auth Server Container App
        run: |
          az containerapp update \
            --name mcp-gateway-auth-server \
            --resource-group ${{ steps.info.outputs.resource_group }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.AUTH_SERVER_IMAGE }}:${{ github.sha }}

      - name: Wait for Deployment
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 30

      - name: Verify Deployment
        run: |
          # Get the registry URL
          REGISTRY_URL=$(az containerapp show \
            --name mcp-gateway-registry \
            --resource-group ${{ steps.info.outputs.resource_group }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)

          echo "Registry URL: https://$REGISTRY_URL"

          # Health check
          for i in {1..5}; do
            if curl -sf "https://$REGISTRY_URL/health" > /dev/null; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

          echo "Health check failed after 5 attempts"
          exit 1

      - name: Post Deployment Summary
        run: |
          REGISTRY_URL=$(az containerapp show \
            --name mcp-gateway-registry \
            --resource-group ${{ steps.info.outputs.resource_group }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)

          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | https://$REGISTRY_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.environment || 'staging' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Smoke Tests
  # ---------------------------------------------------------------------------
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run Smoke Tests
        run: |
          RG_NAME="${{ vars.AZURE_RESOURCE_GROUP || 'mcp-gateway-rg' }}"

          REGISTRY_URL=$(az containerapp show \
            --name mcp-gateway-registry \
            --resource-group $RG_NAME \
            --query properties.configuration.ingress.fqdn \
            --output tsv)

          echo "Testing: https://$REGISTRY_URL"

          # Test health endpoint
          echo "Testing health endpoint..."
          curl -sf "https://$REGISTRY_URL/health" | jq .

          # Test API endpoint (should return 401 without auth)
          echo "Testing API endpoint..."
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "https://$REGISTRY_URL/api/servers" || echo "000")
          if [[ "$HTTP_CODE" == "401" || "$HTTP_CODE" == "403" ]]; then
            echo "API authentication working (returned $HTTP_CODE)"
          else
            echo "Unexpected response code: $HTTP_CODE"
            exit 1
          fi

          echo "All smoke tests passed!"
