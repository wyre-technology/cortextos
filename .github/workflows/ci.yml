name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Fast, container-free front-line gate for schema-vs-harness drift (the
  # mig-030 regression class). Runs on the self-hosted runner so it works
  # regardless of GitHub Actions billing state — it is a plain vitest run,
  # no Postgres and no docker. The container-backed `integration` job below
  # remains the thorough downstream backstop; this job is the fast,
  # unmissable PR-time check. See src/scim/__tests__/migration-drift-check.ts.
  schema-harness-drift:
    runs-on: [self-hosted, wyre-private]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Schema-vs-harness drift gate
        run: npx vitest run src/scim/__tests__/migration-harness-drift.test.ts

  # Fast, container-free front-line gate for the docs site build. docs/ is a
  # separate package (own package.json — Astro/Starlight) that the `build`
  # job below does NOT touch; it only type-checks/builds the conduit app.
  # A Starlight config break once 404'd conduit.wyre.ai/docs entirely and
  # reached prod because nothing CI-gated the docs build (P1-1). This job
  # closes that class: a docs-site build break now fails at PR time. Runs on
  # the self-hosted runner — plain node + astro build, no docker — so it is
  # billing-immune, same as schema-harness-drift above.
  docs-build:
    runs-on: [self-hosted, wyre-private]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install docs dependencies
        run: npm ci
        working-directory: docs

      - name: Build docs site
        run: npm run build
        working-directory: docs

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  integration:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Integration tests (testcontainers/postgresql)
        run: npm run test:integration

  docker:
    runs-on: ubuntu-latest
    needs: [build, integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
