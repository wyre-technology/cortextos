name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Fast, container-free front-line gate for schema-vs-harness drift (the
  # mig-030 regression class). Runs on the self-hosted runner so it works
  # regardless of GitHub Actions billing state — it is a plain vitest run,
  # no Postgres and no docker. The container-backed `integration` job below
  # remains the thorough downstream backstop; this job is the fast,
  # unmissable PR-time check. See src/scim/__tests__/migration-drift-check.ts.
  schema-harness-drift:
    runs-on: [self-hosted, wyre-private]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Schema-vs-harness drift gate
        run: npx vitest run src/scim/__tests__/migration-harness-drift.test.ts

  # Fast, container-free front-line gate for the docs site build. docs/ is a
  # separate package (own package.json — Astro/Starlight) that the `build`
  # job below does NOT touch; it only type-checks/builds the conduit app.
  # A Starlight config break once 404'd conduit.wyre.ai/docs entirely and
  # reached prod because nothing CI-gated the docs build (P1-1). This job
  # closes that class: a docs-site build break now fails at PR time. Runs on
  # the self-hosted runner — plain node + astro build, no docker — so it is
  # billing-immune, same as schema-harness-drift above.
  docs-build:
    runs-on: [self-hosted, wyre-private]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install docs dependencies
        run: npm ci
        working-directory: docs

      - name: Build docs site
        run: npm run build
        working-directory: docs

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  integration:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Integration tests (testcontainers/postgresql)
        run: npm run test:integration

  docker:
    runs-on: ubuntu-latest
    needs: [build, integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: .
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # PR-time gate for the FULL Docker build CONTEXT. The `docker` job above runs
  # ONLY on push-to-main, so a Dockerfile-context break — a stage importing a
  # path outside its COPY context — ships green and reddens main post-merge
  # (#249/#250: the docs-builder stage could not resolve ../../../src/faq because
  # it copies docs/ only, not repo src/). The required `docs-build` job builds in
  # FULL-repo context and resolves such imports — false assurance. This job builds
  # the real image (push:false) at PR time so a build-context break fails BEFORE
  # merge, not on the post-merge push. No push / provenance / sbom / ghcr-login —
  # pure build-context gate. (warden, CI-hardening; closes the gap that shipped #249.)
  docker-build-check:
    name: docker-build-check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: Build image (no push) — gates the full Docker build context at PR time
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Static-analysis gate (CI-QW-5). Diff-aware — only findings this PR
  # INTRODUCES count, computed against the PR merge-base, so the pre-existing
  # backlog never wedges a PR. ERROR findings block; WARNING/INFO are
  # informational (printed, non-blocking). Token-free Semgrep OSS — no
  # Semgrep Cloud upload, no licence.
  semgrep:
    name: SAST (semgrep)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep@sha256:9349edbadf90c3f3c0c3f55867625354e89680e6fa10d9034042af52fdb0e0d0  # 1.162.0
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Compute diff baseline (PR merge-base)
        id: baseline
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --no-tags origin "$BASE_REF"
          echo "sha=$(git merge-base HEAD FETCH_HEAD)" >> "$GITHUB_OUTPUT"

      - name: Semgrep - new findings, all severities (informational)
        env:
          BASELINE_SHA: ${{ steps.baseline.outputs.sha }}
        run: semgrep scan --config p/default --baseline-commit "$BASELINE_SHA" --disable-version-check

      - name: Semgrep - ERROR gate (blocks the PR)
        env:
          BASELINE_SHA: ${{ steps.baseline.outputs.sha }}
        run: semgrep scan --config p/default --baseline-commit "$BASELINE_SHA" --severity ERROR --error --disable-version-check
