name: Deploy to Azure Container Apps

# Manual-dispatch only. The auto-deploy-on-Release path requires Azure OIDC
# federation against the SP `mcp-gateway-github-actions`, scoped to this
# repo's `staging` and `production` environments. Until that federation is
# wired (needs Application Administrator role on the directory — see
# https://learn.microsoft.com/azure/active-directory/develop/workload-identity-federation),
# every workflow_run firing fails at `azure/login@v3` with "Not all values
# are present" and pollutes the PR/main view with red. Re-enable
# `workflow_run` here once the federated credential exists.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
          - conduit-prod

concurrency:
  group: deploy-${{ inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: [self-hosted, wyre-private]
    # Auto-deploy to staging on Release/CI success on main; allow manual
    # dispatch to either environment.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.name == 'Release' && github.event.workflow_run.conclusion == 'success') ||
      (github.event.workflow_run.name == 'CI' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    env:
      DISPATCH_ENV: ${{ inputs.environment }}
    steps:
      - name: Resolve environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="$DISPATCH_ENV"
          else
            # CI/Release on main → staging by default. Production deploys
            # are intentionally manual (gated by the `production` environment).
            ENV="staging"
          fi
          echo "environment=$ENV" >> "$GITHUB_OUTPUT"

  deploy:
    needs: resolve
    runs-on: [self-hosted, wyre-private]
    environment: ${{ needs.resolve.outputs.environment }}

    permissions:
      contents: read
      packages: read
      id-token: write

    env:
      WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      # The [self-hosted, wyre-private] runner image (wyre-aca-runner) bakes in
      # the Azure CLI and Bicep, so azure/login and azure/arm-deploy below find
      # `az` on PATH without an install step. The interim apt-install step that
      # stood here while the pool ran the bare myoung34/github-runner image was
      # removed once the pool rolled onto wyre-aca-runner (task_1779172079827).
      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43  # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get image SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            FULL_SHA="$WORKFLOW_RUN_HEAD_SHA"
          else
            FULL_SHA="$(git rev-parse HEAD)"
          fi
          echo "short=${FULL_SHA:0:7}" >> "$GITHUB_OUTPUT"

      # Read the live gateway's custom-domain bindings and VENDOR_URL_* env so
      # the Bicep deploy preserves them. The conduit Bicep does not own the
      # vendor fleet (gwp-* CAs are deployed by per-vendor pipelines) and the
      # custom-domain managed certs are bound out-of-band — without this, a
      # deploy would wipe both. Empty on first-ever deploy. See azure/modules/
      # gateway-app.bicep (existingCustomDomains / existingVendorEnv params).
      #
      # The JSON is written to FILES and passed to the deploy steps below as
      # `param=@file`, NOT inline as `param=<json>`. azure/arm-deploy strips the
      # double quotes from an inline JSON `--parameters` value (the JSON reaches
      # `az` as `[{key:val}]` — unquoted, unparseable). The `@file` form keeps
      # the JSON off the command line entirely, so quotes survive.
      # conduit-prod lives in its OWN resource group (rg-conduit-prod) and its
      # gateway is `conduit-prod-gateway` — not the `mcpgw-{env}` prefix shape
      # the staging/production stacks use. RG + APP_NAME are env-resolved here.
      - name: Read existing gateway state
        id: gw-state
        env:
          RG: ${{ needs.resolve.outputs.environment == 'conduit-prod' && 'rg-conduit-prod' || vars.AZURE_RESOURCE_GROUP }}
          APP_NAME: ${{ needs.resolve.outputs.environment == 'conduit-prod' && 'conduit-prod-gateway' || format('mcpgw-{0}-gateway', needs.resolve.outputs.environment) }}
        run: |
          set -euo pipefail
          if az containerapp show -n "$APP_NAME" -g "$RG" --only-show-errors >/dev/null 2>&1; then
            DOMAINS=$(az containerapp show -n "$APP_NAME" -g "$RG" --only-show-errors \
              --query 'properties.configuration.ingress.customDomains' -o json | jq -c '. // []')
            VENDOR_ENV=$(az containerapp show -n "$APP_NAME" -g "$RG" --only-show-errors \
              --query 'properties.template.containers[0].env' -o json \
              | jq -c '[.[] | select(.name | startswith("VENDOR_URL_"))]')
          else
            DOMAINS='[]'
            VENDOR_ENV='[]'
          fi
          DOMAINS_FILE="$RUNNER_TEMP/gw-existing-custom-domains.json"
          VENDOR_FILE="$RUNNER_TEMP/gw-existing-vendor-env.json"
          printf '%s' "$DOMAINS" > "$DOMAINS_FILE"
          printf '%s' "$VENDOR_ENV" > "$VENDOR_FILE"
          echo "domains-file=$DOMAINS_FILE" >> "$GITHUB_OUTPUT"
          echo "vendorenv-file=$VENDOR_FILE" >> "$GITHUB_OUTPUT"
          echo "Preserving $(echo "$DOMAINS" | jq 'length') custom-domain binding(s), $(echo "$VENDOR_ENV" | jq 'length') VENDOR_URL_* var(s)"

      # Production: fetch the Rootly Azure Monitor webhook URL from Key Vault.
      # The URL carries a secret query param — it lives only in mcpgw-prod-kv,
      # never as a repo secret or an inline param. Requires the deploy SP to
      # hold the "Key Vault Secrets User" role on mcpgw-prod-kv.
      - name: Fetch Rootly webhook URL (production)
        id: rootly
        if: needs.resolve.outputs.environment == 'production'
        run: |
          set -euo pipefail
          URL=$(az keyvault secret show \
            --vault-name mcpgw-prod-kv \
            --name rootly-azuremonitor-webhook-url \
            --query value -o tsv)
          echo "::add-mask::$URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      # Production: inline params (legacy shape, unchanged from pre-staging)
      - name: Deploy Bicep (production)
        if: needs.resolve.outputs.environment == 'production'
        uses: azure/arm-deploy@a1361c2c2cd398621955b16ca32e01c65ea340f5  # v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ vars.AZURE_RESOURCE_GROUP }}
          template: ./azure/main.bicep
          parameters: >-
            gatewayImage=ghcr.io/${{ github.repository }}:sha-${{ steps.sha.outputs.short }}
            redeployTrigger=${{ github.run_id }}
            containerEnvName=mcpgw-prod-env-v2
            allowedHosts=mcp.wyre.ai,mcp.wyretechnology.com
            adminEmails=aaron@wyretechnology.com,tyork@wyretechnology.com
            threadAppId=19ea2482-5f02-41c1-b723-220ecdaefde5
            entraTrustedTenantIds=d92c73a4-ccc2-4277-8c5d-73c2849adfa4
            alertEmail=engineering@wyretechnology.com
            rootlyWebhookUrl=${{ steps.rootly.outputs.url }}
            masterKey=${{ secrets.MASTER_KEY }}
            jwtSecret=${{ secrets.JWT_SECRET }}
            pgPassword=${{ secrets.PG_PASSWORD }}
            ghcrToken=${{ secrets.GHCR_TOKEN }}
            existingCustomDomains=@${{ steps.gw-state.outputs.domains-file }}
            existingVendorEnv=@${{ steps.gw-state.outputs.vendorenv-file }}
          failOnStdErr: false

      # Production: subscription-scoped monthly cost budget. Deployed on its
      # own — a Microsoft.Consumption/budgets at subscription scope cannot be
      # created by the resource-group deployment above. Requires the deploy SP
      # to hold the "Cost Management Contributor" role at subscription scope.
      - name: Deploy subscription budget (production)
        if: needs.resolve.outputs.environment == 'production'
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          az deployment sub create \
            --name "conduit-subscription-budget-${RUN_ID}" \
            --location eastus2 \
            --template-file ./azure/subscription-budget.bicep \
            --parameters actionGroupId="/subscriptions/d1fd92e8-6084-4dae-83dd-6a9a705f4a1d/resourceGroups/mcp-gateway-prod/providers/microsoft.insights/actionGroups/mcpgw-prod-alerts"

      # Fail loud + early if any of the four staging deploy secrets is unset
      # OR empty. params.staging.bicepparam reads them via
      # readEnvironmentVariable(), which throws only on an UNSET var — but the
      # env: block on the deploy step below always *defines* the vars, so a
      # missing GitHub-environment secret resolves to "" and would otherwise
      # compile a BLANK @secure param rather than fail. An empty MASTER_KEY /
      # JWT_SECRET is forgeable-token / decryptable-credential territory — gate
      # it here rather than ship it.
      - name: Assert staging deploy secrets present
        if: needs.resolve.outputs.environment == 'staging'
        env:
          MASTER_KEY: ${{ secrets.MASTER_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          missing=()
          for v in MASTER_KEY JWT_SECRET PG_PASSWORD GHCR_TOKEN; do
            [ -n "${!v:-}" ] || missing+=("$v")
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Staging deploy secret(s) unset or empty: ${missing[*]}. Set them on the conduit 'staging' GitHub environment."
            exit 1
          fi
          echo "All four staging deploy secrets are present and non-empty."

      # Staging: bicepparam file. The four @secure params are assigned inside
      # params.staging.bicepparam via readEnvironmentVariable() and supplied
      # here as step env: vars — a .bicepparam must self-assign every required
      # param (BCP258), so these cannot be passed as `--parameters` overrides.
      # The guard step above has already asserted all four are non-empty.
      - name: Deploy Bicep (staging)
        if: needs.resolve.outputs.environment == 'staging'
        uses: azure/arm-deploy@a1361c2c2cd398621955b16ca32e01c65ea340f5  # v2
        env:
          MASTER_KEY: ${{ secrets.MASTER_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          scope: resourcegroup
          resourceGroupName: ${{ vars.AZURE_RESOURCE_GROUP }}
          template: ./azure/main.bicep
          parameters: >-
            ./azure/params.staging.bicepparam
            gatewayImage=ghcr.io/${{ github.repository }}:sha-${{ steps.sha.outputs.short }}
            redeployTrigger=${{ github.run_id }}
            existingCustomDomains=@${{ steps.gw-state.outputs.domains-file }}
            existingVendorEnv=@${{ steps.gw-state.outputs.vendorenv-file }}
          failOnStdErr: false

      # conduit-prod: the dedicated own-RG stack (Phase B). Unlike staging/
      # production, conduit-prod keeps ALL of its secrets — the 4 deploy params
      # AND rootlyWebhookUrl — in its own Key Vault `conduit-prod-kv`, not as
      # GitHub-environment secrets. They are fetched here at deploy time; the
      # deploy SP holds `Key Vault Secrets User` on conduit-prod-kv. This keeps
      # conduit-prod-kv the single source of truth for the stack's secrets.
      #
      # pg_trgm guard: migration 012 runs `CREATE EXTENSION pg_trgm`. A fresh
      # Azure PostgreSQL Flexible Server allow-lists NO extensions, so the very
      # first deploy of a fresh conduit Postgres crashloops migrate.ts until
      # `azure.extensions` includes PG_TRGM. The parameter set below is
      # idempotent (a no-op once set) and makes any fresh-Postgres deploy
      # self-healing — see azure/CONDUIT-PROD-DEPLOY.md.
      #
      # `parameter set --value` is set-ABSOLUTE — it REPLACES azure.extensions
      # wholesale, not append. PG_TRGM is the COMPLETE extension set the conduit
      # migrations need today (grep: pg_trgm in 012 is the only CREATE
      # EXTENSION). If a future migration adds another `CREATE EXTENSION`, this
      # `--value` MUST be extended to the full comma-separated set, or that
      # migration will crashloop.
      #
      # customDomain comes from params.conduit-prod.bicepparam
      # (`conduit.wyre.ai`). This path is for STEADY-STATE deploys, i.e. after
      # the conduit.wyre.ai custom domain is bound to conduit-prod-gateway; the
      # `Read existing gateway state` step then carries the binding through
      # `existingCustomDomains`. The first-ever standup (deploy without the
      # domain, bind, redeploy) is the interactive runbook in
      # azure/CONDUIT-PROD-DEPLOY.md, not this workflow.
      - name: Deploy Bicep (conduit-prod)
        if: needs.resolve.outputs.environment == 'conduit-prod'
        env:
          IMAGE: ghcr.io/${{ github.repository }}:sha-${{ steps.sha.outputs.short }}
          RUN_ID: ${{ github.run_id }}
          DOMAINS_FILE: ${{ steps.gw-state.outputs.domains-file }}
          VENDORENV_FILE: ${{ steps.gw-state.outputs.vendorenv-file }}
        run: |
          set -euo pipefail
          KV=conduit-prod-kv
          # Fetch the stack's secrets from its own Key Vault.
          MASTER_KEY=$(az keyvault secret show --vault-name "$KV" --name master-key --query value -o tsv)
          JWT_SECRET=$(az keyvault secret show --vault-name "$KV" --name jwt-secret --query value -o tsv)
          PG_PASSWORD=$(az keyvault secret show --vault-name "$KV" --name pg-password --query value -o tsv)
          GHCR_TOKEN=$(az keyvault secret show --vault-name "$KV" --name ghcr-token --query value -o tsv)
          ROOTLY_URL=$(az keyvault secret show --vault-name "$KV" --name rootly-azuremonitor-webhook-url --query value -o tsv)
          for v in MASTER_KEY JWT_SECRET PG_PASSWORD GHCR_TOKEN ROOTLY_URL; do
            echo "::add-mask::${!v}"
            [ -n "${!v:-}" ] || { echo "::error::conduit-prod-kv secret for $v is empty"; exit 1; }
          done
          export MASTER_KEY JWT_SECRET PG_PASSWORD GHCR_TOKEN
          # Idempotent pg_trgm allow-list — load-bearing on a fresh Postgres.
          az postgres flexible-server parameter set \
            --resource-group rg-conduit-prod --server-name conduit-prod-pg \
            --name azure.extensions --value PG_TRGM --only-show-errors -o none
          az deployment group create \
            --resource-group rg-conduit-prod \
            --name "conduit-prod-${RUN_ID}" \
            --template-file ./azure/main.bicep \
            --parameters ./azure/params.conduit-prod.bicepparam \
            --parameters \
              gatewayImage="$IMAGE" \
              redeployTrigger="$RUN_ID" \
              rootlyWebhookUrl="$ROOTLY_URL" \
              existingCustomDomains=@"$DOMAINS_FILE" \
              existingVendorEnv=@"$VENDORENV_FILE"
