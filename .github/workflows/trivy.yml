name: Trivy Vulnerability Scan

# Trivy scans for known CVEs in two surfaces:
#
#   1. Filesystem scan (repo checkout) → lockfile + Dockerfile + IaC.
#      Runs on PR so a new vulnerable dep shows up inline.
#   2. Container image scan → the published ghcr.io image that
#      .github/workflows/release.yml builds. Runs on a weekly schedule
#      against the :latest tag, and on workflow_dispatch for ad-hoc
#      re-scans after a fix.
#
# The filesystem scan runs two steps: an informational pass
# (CRITICAL/HIGH/MEDIUM, never blocks) for visibility, and a CRITICAL
# gate (exit-code 1) that fails the PR on a fixable CRITICAL CVE
# (CI-QW-4). The image scan prints findings to the run log in table
# format and does not block. See docs/operations/security-scanning.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Tuesdays 06:23 UTC — a day after CodeQL so Security-tab noise is spread.
    - cron: '23 6 * * 2'
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/wyre-technology/conduit

jobs:
  fs-scan:
    name: Filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Run Trivy (fs)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          # Table format prints findings inline in the run log. SARIF upload
          # to the Security tab requires GitHub Advanced Security, which
          # isn't enabled on this repo (private, no GHAS) — every upload
          # attempt failed with "Resource not accessible by integration".
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          # Always exit 0 — informational scan, don't block PRs.
          exit-code: '0'

      - name: Run Trivy (fs) — CRITICAL gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL'
          ignore-unfixed: true
          # Blocking — a fixable CRITICAL CVE fails the PR (CI-QW-4).
          exit-code: '1'

  image-scan:
    name: Container image scan
    # Only useful once a released image exists; PR builds don't publish.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Run Trivy (image)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: '${{ env.IMAGE_NAME }}:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'
