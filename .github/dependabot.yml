# Dependabot configuration for Conduit.
#
# Weekly update PRs for all ecosystems we actually ship:
#   - npm:            runtime + dev deps (root and packages/cli)
#   - docker:         base images referenced by Dockerfile
#   - github-actions: action versions pinned in .github/workflows/*
#
# Findings surface as PRs labelled "deps" (plus a sub-label per ecosystem).
# See docs/operations/security-scanning.md for triage guidance.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels: ["deps", "npm"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "npm"
    directory: "/packages/cli"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["deps", "npm", "cli"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["deps", "docker"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["deps", "ci"]
    commit-message:
      prefix: "chore(deps)"
